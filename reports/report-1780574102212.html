      background: #1e2433;

      padding: 0.75rem 1rem;
      text-align: right;
      font-size: 0.85rem;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    td {
      padding: 0.75rem 1rem;
      border-top: 1px solid #2d3748;

    .fail { color: #f87171; }
    .pass-row td:first-child { border-right: 3px solid #4ade80; }
    .fail-row td:first-child { border-right: 3px solid #f87171; }
    .error-msg {
      background: #2d1f1f;
      color: #fca5a5;
      font-size: 0.85rem;
      padding: 0.5rem 1rem;
    }
    .images-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 1rem;
      padding: 0.75rem 0;
    }
    .img-box {
      background: #151821;
      border-radius: 8px;
      padding: 0.75rem;
      text-align: center;
    }
    .img-box img {
      width: 100%;
      border-radius: 4px;
      margin-top: 0.5rem;
      border: 1px solid #2d3748;
    }
    .img-label {
      font-size: 0.75rem;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .no-img { color: #4b5563; font-size: 0.85rem; margin-top: 0.5rem; }
    .no-diff { border: 1px dashed #2d3748; }
    .images-row td { background: #161b27; }
