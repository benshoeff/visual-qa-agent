<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
  <meta charset="UTF-8" />
  <title>דוח Visual QA</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      padding: 2rem;
      direction: rtl;
    }
    h1 { font-size: 1.8rem; margin-bottom: 0.25rem; color: #fff; }
    .meta { color: #94a3b8; font-size: 0.9rem; margin-bottom: 2rem; }
    .summary {
      display: flex;
      gap: 1rem;
      margin-bottom: 2rem;
    }
    .stat {
      background: #1e2433;
      border-radius: 12px;
      padding: 1rem 1.5rem;
      min-width: 120px;
      text-align: center;
    }
    .stat .num { font-size: 2rem; font-weight: bold; }
    .stat .lbl { font-size: 0.8rem; color: #94a3b8; margin-top: 0.2rem; }
    .pass-num { color: #4ade80; }
    .fail-num { color: #f87171; }
    table {
      width: 100%;
      border-collapse: collapse;
      background: #1e2433;
      border-radius: 12px;
      overflow: hidden;
    }
    th {
      background: #2d3748;
      padding: 0.75rem 1rem;
      text-align: right;
      font-size: 0.85rem;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    td {
      padding: 0.75rem 1rem;
      border-top: 1px solid #2d3748;
      font-size: 0.95rem;
    }
    .pass { color: #4ade80; }
    .fail { color: #f87171; }
    .pass-row td:first-child { border-right: 3px solid #4ade80; }
    .fail-row td:first-child { border-right: 3px solid #f87171; }
    .error-msg {
      background: #2d1f1f;
      color: #fca5a5;
      font-size: 0.85rem;
      padding: 0.5rem 1rem;
    }
    .images-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 1rem;
      padding: 0.75rem 0;
    }
    .img-box {
      background: #151821;
      border-radius: 8px;
      padding: 0.75rem;
      text-align: center;
    }
    .img-box img {
      width: 100%;
      border-radius: 4px;
      margin-top: 0.5rem;
      border: 1px solid #2d3748;
    }
    .img-label {
      font-size: 0.75rem;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .no-img { color: #4b5563; font-size: 0.85rem; margin-top: 0.5rem; }
    .no-diff { border: 1px dashed #2d3748; }
    .images-row td { background: #161b27; }
  </style>
</head>
<body>
  <h1>🔍 דוח Visual QA</h1>
  <p class="meta">הופק: 20.6.2026, 18:49:00</p>

  <div class="summary">
    <div class="stat">
      <div class="num">1</div>
      <div class="lbl">סה"כ דפים</div>
    </div>
    <div class="stat">
      <div class="num pass-num">0</div>
      <div class="lbl">עברו</div>
    </div>
    <div class="stat">
      <div class="num fail-num">1</div>
      <div class="lbl">נכשלו</div>
    </div>
  </div>

  <table>
    <thead>
      <tr>
        <th>שם הדף</th>
        <th>סטטוס</th>
        <th>% שינוי</th>
        <th>פיקסלים שונים</th>
      </tr>
    </thead>
    <tbody>
      
      <tr class="fail-row">
        <td><strong>homepage</strong></td>
        <td class="fail">❌ נכשל</td>
        <td>0%</td>
        <td>0 פיקסלים</td>
      </tr>
      <tr><td colspan="4" class="error-msg">⚠️ page.goto: Target page, context or browser has been closed
Call log:
  - navigating to "https://benshoeff.github.io/QA-Forge/", waiting until "networkidle"
</td></tr>
      
    
    </tbody>
  </table>
</body>
</html>
