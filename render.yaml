services:
  - type: web
    name: visual-qa-agent
    runtime: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: NODE_ENV
        value: production
      - key: PLAYWRIGHT_BROWSERS_PATH
        value: /ms-playwright

  - type: cron
    name: nightly-regression
    runtime: docker
    schedule: "0 9 * * *"
    dockerfilePath: ./Dockerfile.cron
    envVars:
      - key: WEB_SERVICE_URL
        value: https://visual-qa-agent.onrender.com
    startCommand: >
      sh -c "curl -s -S -o /dev/null -w '%{http_code}' -X POST $WEB_SERVICE_URL/api/run/scheduled"
